# Config fitted to the bundled community US data (~/.qlib/qlib_data/us),
# which ends 2020-11-10. The production config (alpha158_lgb.yaml) targets
# us_live with 2025 dates. Use this one for the end-to-end demo run.
qlib_init:
  provider_uri: "~/.qlib/qlib_data/us"
  region: us

market: &market sp500

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      learning_rate: 0.05
      num_leaves: 63
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: 2010-01-01
          end_time: 2020-11-01
          fit_start_time: 2010-01-01
          fit_end_time: 2016-12-31
          instruments: *market
      segments:
        train: [2010-01-01, 2016-12-31]
        valid: [2017-01-01, 2017-12-31]
        test:  [2018-01-01, 2020-11-01]

port_analysis_config:
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 20
      n_drop: 3
  backtest:
    start_time: 2018-01-01
    end_time: 2020-11-01
    account: 20000
    benchmark: ^gspc
    exchange_kwargs:
      open_cost: 0.0005
      close_cost: 0.0005
      min_cost: 1
